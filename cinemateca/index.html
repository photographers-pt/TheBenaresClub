		const backgroundVideo = document.getElementById('backgroundVideo');
		const backgroundImage = document.getElementById('backgroundImage');


	// Modal functions
	function openModal(movieIndex) {
		const movie = movies[movieIndex];
		const modal = document.getElementById('movieModal');
		
		// Set movie details
		document.getElementById('modalTitle').textContent = movie.title;
		document.getElementById('modalYear').textContent = movie.year;
		document.getElementById('modalDescription').textContent = movie.description;
		
		// Set Vimeo player
		const vimeoPlayer = document.getElementById('vimeoPlayer');
		if (movie.vimeoId) {
			vimeoPlayer.src = `https://player.vimeo.com/video/${movie.vimeoId}?autoplay=0&title=0&byline=0&portrait=0`;
		} else {
			vimeoPlayer.src = '';
		}
		
		// Build cast list
		const castList = document.getElementById('castList');
		if (movie.cast && movie.cast.length > 0) {
			castList.innerHTML = movie.cast.map(actor => `
				<div class="cast-member">
					<img src="${actor.photo}" alt="${actor.name}" class="cast-photo" onerror="this.src='https://via.placeholder.com/60'">
					<div class="cast-info">
						<a href="${actor.profile}" target="_blank" class="cast-name">${actor.name}</a>
						<p class="cast-character">${actor.character}</p>
					</div>
				</div>
			`).join('');
		} else {
			castList.innerHTML = '<p style="color: rgba(255,255,255,0.5);">Cast information not available.</p>';
		}
		
		// Build crew list
		const crewList = document.getElementById('crewList');
		if (movie.crew && movie.crew.length > 0) {
			crewList.innerHTML = movie.crew.map(member => `
				<div class="crew-member">
					<a href="${member.link || 'https://www.instagram.com/'}" target="_blank" class="crew-name">${member.name}</a>
					<p class="crew-roles">${member.roles.join(', ')}</p>
				</div>
			`).join('');
		} else {
			crewList.innerHTML = '<p style="color: rgba(255,255,255,0.5);">Crew information not available.</p>';
		}
		
		// Show modal
		modal.classList.add('active');
		document.body.style.overflow = 'hidden';
		
		console.log(`🎬 Opened modal for: ${movie.title}`);
	}

	function closeModal() {
		const modal = document.getElementById('movieModal');
		modal.classList.remove('active');
		document.body.style.overflow = 'auto';
		
		// Stop Vimeo video
		const vimeoPlayer = document.getElementById('vimeoPlayer');
		vimeoPlayer.src = '';
		
		console.log('❌ Closed modal');
	}

	// Close modal when clicking outside
	document.addEventListener('click', (e) => {
		const modal = document.getElementById('movieModal');
		if (e.target === modal) {
			closeModal();
		}
	});

	// Close modal with Escape key
	document.addEventListener('keydown', (e) => {
		if (e.key === 'Escape') {
			closeModal();
		}
	});

		// Load posters
		function loadPosters() {
			console.log('🎯 Loading posters...');
			const grid = document.getElementById('postersGrid');
			
			grid.innerHTML = movies.map((movie, index) => `
				<div class="poster-card" data-video="${movie.video}" data-index="${index}">
					<img src="${movie.poster}" alt="${movie.title}">
					<div class="poster-info">
						<h3 class="poster-title">${movie.title}</h3>
						<p class="poster-meta">${movie.year}</p>
					</div>
				</div>
			`).join('');

			console.log(`✅ Loaded ${movies.length} posters`);
			
			// Add hover events
			document.querySelectorAll('.poster-card').forEach(card => {
				const videoSrc = card.dataset.video;
				const index = card.dataset.index;
				const movie = movies[index];
				
				card.addEventListener('mouseenter', () => {
					console.log(`🎥 Hovering ${movie.title}`);
					backgroundVideo.src = videoSrc;
					backgroundVideo.style.opacity = '0.5';
					// Also update background image for mobile
					if (movie.backgroundImage) {
						backgroundImage.style.backgroundImage = `url('${movie.backgroundImage}')`;
						backgroundImage.style.opacity = '0.5';
					}
				});
				
				card.addEventListener('mouseleave', () => {
					console.log('⬅️ Mouse left poster');
					backgroundVideo.style.opacity = '0.3';
					backgroundImage.style.opacity = '0.5'; // Keep mobile background visible
				});
				
				// Touch event for mobile background changes
				card.addEventListener('touchstart', () => {
					console.log(`📱 Touched ${movie.title}`);
					if (movie.backgroundImage) {
						backgroundImage.style.backgroundImage = `url('${movie.backgroundImage}')`;
						backgroundImage.style.opacity = '0.5';
					}
				}, { passive: true });
					
					// Add click event to open modal
					card.addEventListener('click', () => {
						openModal(index);
					});
			});
		}

		// Initialize
		document.addEventListener('DOMContentLoaded', () => {
			console.log('✨ Cinema page loaded');
			
			
			loadPosters();
			initDragScroll(); // Enable mouse drag scrolling
			
			// Reset scroll position to show leftmost movie
			const postersGrid = document.getElementById('postersGrid');
			if (postersGrid) {
				postersGrid.scrollLeft = 0;
				console.log('📍 Scroll position reset to 0');
			}
		});

		// Enable mouse drag scrolling on posters grid
		function initDragScroll() {
			const slider = document.getElementById('postersGrid');
			let isDown = false;
			let startX;
			let scrollLeft;

			slider.addEventListener('mousedown', (e) => {
				isDown = true;
				slider.style.cursor = 'grabbing';
				slider.style.userSelect = 'none';
				startX = e.pageX - slider.offsetLeft;
				scrollLeft = slider.scrollLeft;
			});

			slider.addEventListener('mouseleave', () => {
				isDown = false;
				slider.style.cursor = 'grab';
			});

			slider.addEventListener('mouseup', () => {
				isDown = false;
				slider.style.cursor = 'grab';
			});

			slider.addEventListener('mousemove', (e) => {
				if (!isDown) return;
				e.preventDefault();
				const x = e.pageX - slider.offsetLeft;
				const walk = (x - startX) * 2; // Scroll speed multiplier
				slider.scrollLeft = scrollLeft - walk;
			});

			// Set initial cursor
			slider.style.cursor = 'grab';

			// Touch events for mobile swipe
			let touchStartX = 0;
			let touchScrollLeft = 0;
			
			slider.addEventListener('touchstart', (e) => {
				touchStartX = e.touches[0].pageX;
				touchScrollLeft = slider.scrollLeft;
			}, { passive: true });
			
			slider.addEventListener('touchmove', (e) => {
				const x = e.touches[0].pageX;
				const walk = (touchStartX - x) * 1.5;
				slider.scrollLeft = touchScrollLeft + walk;
			}, { passive: true });

			console.log('✅ Drag and touch scrolling enabled');
		}

	</script>
