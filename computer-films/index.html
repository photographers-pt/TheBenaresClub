<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Laboratorio | Club Benares</title>
	
	<!-- Google Fonts - Inter font family -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
	
	<!-- Main stylesheet -->
	<link rel="stylesheet" href="../styles.css">
	
	<!-- Favicon - small icon in browser tab -->
	<link rel="icon" href="./media/A00 Logo - Light.png" type="image/png" />
	
	<!-- Font Awesome icons library -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
	<!-- Placeholder div for dynamically loaded header (via JavaScript) -->
	<div id="header-container"></div>

	<!-- Main content area -->
	<main>
		<!-- Container for the computer monitor visualization -->
		<div class="computer-wrapper">
			<!-- Monitor frame/bezel image background -->
			<div class="monitor-background"></div>
			
			<!-- Embedded operating system simulation -->
			<iframe 
				src="system.html" 
				class="os-simulation"
				title="Vista Operating System Simulation"
				frameborder="0"
				allowfullscreen>
			</iframe>
		</div>
	</main>

	<!-- Placeholder div for dynamically loaded footer (via JavaScript) -->
	<div id="footer-container"></div>
	
	<!-- JavaScript file that loads shared components (header/footer) -->
	<script src="../shared.js"></script>

	<style>
		/* Page background wallpaper */
		body {
			background-image: url("wallpaper.jpg");
		}

		/* Main wrapper for monitor and iframe - centers everything */
		.computer-wrapper {
			display: flex;                /* Flexbox for centering */
			justify-content: center;      /* Horizontal centering */
			align-items: center;          /* Vertical centering */
			min-height: 80vh;             /* Minimum 80% of viewport height */
			padding: 2rem;                /* Breathing room around content */
			position: relative;           /* Positioning context for children */
			width: 100%;                  /* Full width */
			height: 100%;                 /* Full height */
		}

		/* Monitor background image (bezel/frame) */
		.monitor-background {
			position: absolute;           /* Positioned behind iframe */
			width: 1739px;                /* Calculated: 1280 * 1.43 * 0.95 */
			height: 1062px;               /* Calculated: 1739 * 0.611 (aspect ratio) */
			background-image: url('monitor.png');
			background-size: contain;     /* Fit image without cropping */
			background-repeat: no-repeat; /* Don't tile the image */
			background-position: center;  /* Center the monitor image */
			z-index: 1;                   /* Behind the iframe (layer 1) */
			pointer-events: none;         /* Don't block clicks to iframe */
			transform: translateY(100px); /* Move down 100px for alignment */
		}

		/* OS simulation iframe (the "screen" content) */
		.os-simulation {
			position: relative;           /* Positioned in front of monitor */
			width: 1280px;                /* Screen width */
			height: 780px;                /* Screen height */
			border: none;                 /* Remove default iframe border */
			filter: grayscale(100%);      /* Black and white effect on iframe */
			background: #000;             /* Black background */
			z-index: 2;                   /* In front of monitor (layer 2) */
		}

		/* Grayscale filter applied to entire page */
		body {
			filter: grayscale(100%);      /* Black and white effect */
		}
	</style>

</body>
</html>
