<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive A6 Grid Page</title>
<style>
	body {
		margin: 0;
		background: #e8ecf3;
		display: flex;
		justify-content: center;
		align-items: center;
		height: 100vh;
		touch-action: none; /* prevent default scrolling */
	}

	.perspective-wrapper {
		perspective: 1200px;
		width: 90vw;
		max-width: 400px;
	}

	.paper {
		width: 100%;
		aspect-ratio: 397/561; /* A6 ratio */
		background: #f3e8c7; /* beige paper */
		background-image:
			linear-gradient(#c7c7c7 1px, transparent 1px),
			linear-gradient(90deg, #c7c7c7 1px, transparent 1px);
		background-size: 19px 19px; /* 5mm grid */
		box-shadow: 0 30px 60px rgba(0,0,0,0.25);
		transform: rotateY(-32deg) rotateX(8deg) scale(1);
		display: flex;
		flex-direction: column;
		justify-content: flex-start;
		padding: 25px;
		color: #000;
		font-family: sans-serif;
		user-select: none;
	}

	h1 {
		margin: 0 0 10px;
		font-size: 26px;
	}

	p {
		margin: 0;
		font-size: 16px;
		line-height: 1.4;
	}
</style>
</head>
<body>

<div class="perspective-wrapper">
	<div class="paper">
		<h1>Notes</h1>
		<p>A6 beige page with 5 mm grid. Drag to rotate, pinch or scroll to zoom.</p>
	</div>
</div>

<script>
const paper = document.querySelector('.paper');
const wrapper = document.querySelector('.perspective-wrapper');

let rotateX = 8;
let rotateY = -32;
let scale = 1;

let isDragging = false;
let startX = 0;
let startY = 0;
let startRotateX = rotateX;
let startRotateY = rotateY;

// Mouse Events
wrapper.addEventListener('mousedown', e => {
	isDragging = true;
	startX = e.clientX;
	startY = e.clientY;
	startRotateX = rotateX;
	startRotateY = rotateY;
});
window.addEventListener('mousemove', e => {
	if (!isDragging) return;
	const dx = e.clientX - startX;
	const dy = e.clientY - startY;
	rotateY = startRotateY + dx * 0.3;
	rotateX = startRotateX - dy * 0.3;
	updateTransform();
});
window.addEventListener('mouseup', () => isDragging = false);

// Touch Events
let touchStartDistance = 0;
let initialScale = scale;
wrapper.addEventListener('touchstart', e => {
	if (e.touches.length === 1) {
		isDragging = true;
		startX = e.touches[0].clientX;
		startY = e.touches[0].clientY;
		startRotateX = rotateX;
		startRotateY = rotateY;
	} else if (e.touches.length === 2) {
		isDragging = false;
		touchStartDistance = getDistance(e.touches[0], e.touches[1]);
		initialScale = scale;
	}
});
wrapper.addEventListener('touchmove', e => {
	e.preventDefault();
	if (e.touches.length === 1 && isDragging) {
		const dx = e.touches[0].clientX - startX;
		const dy = e.touches[0].clientY - startY;
		rotateY = startRotateY + dx * 0.3;
		rotateX = startRotateX - dy * 0.3;
		updateTransform();
	} else if (e.touches.length === 2) {
		const distance = getDistance(e.touches[0], e.touches[1]);
		scale = Math.min(Math.max(0.5, initialScale * (distance / touchStartDistance)), 3);
		updateTransform();
	}
});
window.addEventListener('touchend', e => {
	if (e.touches.length === 0) isDragging = false;
});

// Mouse wheel zoom
wrapper.addEventListener('wheel', e => {
	e.preventDefault();
	scale += e.deltaY * -0.001;
	scale = Math.min(Math.max(0.5, scale), 3);
	updateTransform();
});

function getDistance(touch1, touch2) {
	const dx = touch2.clientX - touch1.clientX;
	const dy = touch2.clientY - touch1.clientY;
	return Math.hypot(dx, dy);
}

function updateTransform() {
	paper.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) scale(${scale})`;
}
</script>

</body>
</html>
