<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bahianita&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,100,0,200&icon_names=star" />
<link rel="icon" href="/media/A00 Logo - Light.png" type="image/png" />
<link rel="stylesheet" href="/styles.css">


<style>

	main {
		margin: 0;
		background: #000;
		display: flex;
		justify-content: center;
		align-items: center;
		height: 100%;
		touch-action: none;
		font-family: "Bahianita", sans-serif;
	}

	.perspective-wrapper {
		perspective: 1200px;
		width: 90vw;
		max-width: 400px;
	}

	.paper {
		width: 100%;
		aspect-ratio: 397/561;
		background: #f3e8c7;
		background-image:
			linear-gradient(#dfd5b5 1px, transparent 1px),
			linear-gradient(90deg, #dfd5b5 1px, transparent 1px);
		background-size: 19px 19px;
		box-shadow: 0 30px 60px rgba(0,0,0,0.25);
		transform: rotateY(-32deg) rotateX(8deg) scale(1);
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: flex-start;
		padding: 15px;
		color: #000;
		font-family: "Bahianita", sans-serif;
		user-select: none;
		gap: 60px;
	}

	.content-box {
		width: 90mm;
		height: 55mm;
		border: 3px solid rgba(0, 0, 0, 0.05);
		background: transparent;
		padding: 10px;
		box-sizing: border-box;
		display: flex;
		flex-direction: column;
		justify-content: flex-start;
		overflow: hidden;
		transform-origin: top left;
	}

	.movie-line {
		display: flex;
		justify-content: space-between;
		align-items: center;
		width: 100%;
	}

	.stars {
		display: flex;
		gap: 0px;
	}

	.header-section {
		width: 100%;
	}

	.watched-line {
		display: flex;
		justify-content: space-between;
		align-items: center;
		width: 100%;
		margin-bottom: 8px;
	}

	.watch-type {
		display: flex;
		gap: 12px;
		align-items: center;
		margin-top: 6px;
	}

	.checkbox-item {
		display: flex;
		align-items: center;
		gap: 4px;
		font-size: 18px;
	}

	.checkbox {
		width: 14px;
		height: 14px;
		border: 1px solid #000;
		cursor: pointer;
	}

	.spacer {
		height: 12px;
		border-bottom: 2px solid #000;
		margin: 0px 0;
	}

	p {
		margin: 0;
		font-size: 22px;
		line-height: 1.2;
		font-family: "Bahianita", sans-serif;
		letter-spacing: 0.01em;
		transform: scaleX(1.08);
		transform-origin: top left;
	}

	.label {
		font-size: 18px;
		margin: 0;
	}

	.material-symbols-outlined {
		font-variation-settings:
		'FILL' 0,
		'wght' 100,
		'GRAD' 200,
		'opsz' 48;
		font-size: 28px;
		vertical-align: middle;
		position: relative;
		top: -2px;
		margin-left: 4px;
	}

	.bahianita-regular {
		font-family: "Bahianita", sans-serif;
		font-weight: 400;
		font-style: normal;
	}
</style>
</head>
<body class="bg-sample">
	  <div id="header-container"></div>
<main>

<div class="perspective-wrapper">
	<div class="paper" id="paper">
		<div class="content-box">
			<div class="header-section">
				<div class="movie-line">
					<p>Movie:</p>
					<div class="stars">
						<span class="material-symbols-outlined">star</span>
						<span class="material-symbols-outlined">star</span>
						<span class="material-symbols-outlined">star</span>
						<span class="material-symbols-outlined">star</span>
						<span class="material-symbols-outlined">star</span>
					</div>
				</div>
				
				<div class="watched-line">
					<p class="label" style="visibility: hidden;">Watched:</p>
					<p class="label">31-12-1999</p>
				</div>

				<div class="watch-type">
					<div class="checkbox-item">
						<input type="checkbox" class="checkbox">
						<span>First Watch</span>
					</div>
					<div class="checkbox-item">
						<input type="checkbox" class="checkbox">
						<span>Rewatch</span>
					</div>
				</div>
			</div>

			<div class="spacer"></div>
			<p class="label">By:</p>
			<div class="spacer"></div>
			<p class="label">At:</p>
			<div class="spacer"></div>
			<p class="label">Notes:</p>
		</div>
	</div>
</div>
</main>
<div id="footer-container"></div>

<script>
const paper = document.querySelector('.paper');
const wrapper = document.querySelector('.perspective-wrapper');

let rotateX = 8;
let rotateY = -32;
let scale = 1;

let isDragging = false;
let startX = 0;
let startY = 0;
let startRotateX = rotateX;
let startRotateY = rotateY;

wrapper.addEventListener('mousedown', e => {
	isDragging = true;
	startX = e.clientX;
	startY = e.clientY;
	startRotateX = rotateX;
	startRotateY = rotateY;
});

window.addEventListener('mousemove', e => {
	if (!isDragging) return;
	const dx = e.clientX - startX;
	const dy = e.clientY - startY;
	rotateY = startRotateY + dx * 0.3;
	rotateX = startRotateX - dy * 0.3;
	updateTransform();
});

window.addEventListener('mouseup', () => isDragging = false);

let touchStartDistance = 0;
let initialScale = scale;

wrapper.addEventListener('touchstart', e => {
	if (e.touches.length === 1) {
		isDragging = true;
		startX = e.touches[0].clientX;
		startY = e.touches[0].clientY;
		startRotateX = rotateX;
		startRotateY = rotateY;
	} else if (e.touches.length === 2) {
		isDragging = false;
		touchStartDistance = getDistance(e.touches[0], e.touches[1]);
		initialScale = scale;
	}
});

wrapper.addEventListener('touchmove', e => {
	e.preventDefault();
	if (e.touches.length === 1 && isDragging) {
		const dx = e.touches[0].clientX - startX;
		const dy = e.touches[0].clientY - startY;
		rotateY = startRotateY + dx * 0.3;
		rotateX = startRotateX - dy * 0.3;
		updateTransform();
	} else if (e.touches.length === 2) {
		const distance = getDistance(e.touches[0], e.touches[1]);
		scale = Math.min(Math.max(0.5, initialScale * (distance / touchStartDistance)), 3);
		updateTransform();
	}
});

window.addEventListener('touchend', e => {
	if (e.touches.length === 0) isDragging = false;
});

wrapper.addEventListener('wheel', e => {
	e.preventDefault();
	scale += e.deltaY * -0.001;
	scale = Math.min(Math.max(0.5, scale), 3);
	updateTransform();
});

function getDistance(touch1, touch2) {
	const dx = touch2.clientX - touch1.clientX;
	const dy = touch2.clientY - touch1.clientY;
	return Math.hypot(dx, dy);
}

function updateTransform() {
	paper.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) scale(${scale})`;
}

// Duplicate content boxes
const originalBox = document.querySelector('.content-box');
const paperEl = document.getElementById('paper');
const clonedBox = originalBox.cloneNode(true);
paperEl.appendChild(clonedBox);
</script>
  <script src="/shared.js"></script>


</body>
</html>
