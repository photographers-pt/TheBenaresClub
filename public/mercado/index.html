<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mercado | Club Benares</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/media/A00 Logo - Light.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://js.stripe.com/v3/"></script>

  <style>
    /* ===========================
       MERCADO — STORE REDESIGN
    =========================== */

    /* ---------- BACKGROUND BLUR ---------- */
    body.bg-mercado::before {
      content: '';
      position: fixed;
      inset: 0;
      background: inherit;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(18px) brightness(0.45);
      transform: scale(1.1); /* prevent blur edge artifacts */
      z-index: -1;
    }

    html { scroll-behavior: auto; }

    /* ---------- CART BAR ---------- */
    .cart-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1.2rem;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .cart-bar-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cart-bar-left span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.45);
      font-family: 'Space Mono', monospace;
    }

    .cart-category-pills {
      display: flex;
      gap: 0.4rem;
    }

    .cart-pill {
      font-size: 0.65rem;
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .cart-pill:hover,
    .cart-pill.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }

    /* ---------- FLOATING CART BUTTON ---------- */
    .cart-fab {
      position: fixed;
      bottom: 3.5rem;
      right: 3rem;
      z-index: 900;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 1.05rem 2rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(10,10,10,0.65);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }

    .cart-fab:hover {
      background: rgba(20,20,20,0.8);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.6);
    }

    .cart-fab i {
      font-size: 1.3rem;
    }

    .cart-fab-label {
      letter-spacing: 0.06em;
    }

    .cart-count {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cart-count.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ---------- STORE GRID ---------- */
    .store-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* ---------- PRODUCT CARD ---------- */
    .product-card {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .product-card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }

    .product-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-card-img img {
      transform: scale(1.06);
    }

    .product-badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      font-size: 0.55rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .product-card-body {
      padding: 1rem 1.1rem 1.1rem;
    }

    .product-card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .product-card-desc {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.75rem;
      line-height: 1.45;
    }

    .product-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-card-price {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .product-add-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .product-add-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
    }

    .product-add-btn.added {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }

    /* ---------- CATEGORY HEADERS ---------- */
    .category-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem 0 1.2rem;
      padding: 0 0.25rem;
    }

    .category-divider:first-child {
      margin-top: 0;
    }

    .category-divider-label {
      font-size: 0.6rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .category-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .category-count {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.25);
      font-family: 'Space Mono', monospace;
    }

    /* ---------- CART DRAWER ---------- */
    .cart-drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .cart-drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 92vw);
      height: 100%;
      background: rgba(12, 12, 12, 0.85);
      backdrop-filter: blur(24px) saturate(130%);
      -webkit-backdrop-filter: blur(24px) saturate(130%);
      border-left: 1px solid rgba(255,255,255,0.07);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .cart-drawer.open {
      transform: translateX(0);
    }

    .cart-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .cart-drawer-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
    }

    .cart-drawer-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .cart-drawer-close:hover { color: #fff; }

    .cart-drawer-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.4rem;
    }

    .cart-drawer-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
    }

    .cart-item {
      display: flex;
      gap: 0.9rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }

    .cart-item-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
      min-width: 0;
    }

    .cart-item-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.15rem;
    }

    .cart-item-price {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      font-family: 'Space Mono', monospace;
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cart-item-qty button {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .cart-item-qty button:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .cart-item-qty span {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: #fff;
      min-width: 1.2rem;
      text-align: center;
    }

    .cart-drawer-footer {
      padding: 1.2rem 1.4rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .cart-total-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      font-family: 'Space Mono', monospace;
    }

    .cart-total-amount {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .cart-checkout-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .cart-checkout-btn:hover {
      background: #e0e0e0;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.1);
    }

    .cart-checkout-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .cart-checkout-btn .stripe-icon {
      height: 14px;
      opacity: 0.5;
    }

    /* ---------- PRODUCT DETAIL MODAL ---------- */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 8000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .detail-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: min(520px, 92vw);
      max-height: 88vh;
      overflow-y: auto;
      background: rgba(14, 14, 14, 0.88);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      z-index: 8001;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      color: #fff;
    }

    .detail-modal.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .detail-modal-img {
      width: 100%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 16px 16px 0 0;
      background: rgba(0,0,0,0.3);
      display: block;
    }

    .detail-gallery {
      position: relative;
    }

    .detail-thumbs {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      overflow-x: auto;
      background: rgba(0,0,0,0.2);
    }

    .detail-thumbs:empty {
      display: none;
    }

    .detail-thumb {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.5;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .detail-thumb:hover {
      opacity: 0.8;
    }

    .detail-thumb.active {
      opacity: 1;
      border-color: rgba(255,255,255,0.5);
    }

    .detail-thumbs::-webkit-scrollbar { height: 3px; }
    .detail-thumbs::-webkit-scrollbar-track { background: transparent; }
    .detail-thumbs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .detail-modal-body {
      padding: 1.5rem 1.6rem 1.8rem;
    }

    .detail-modal-badge {
      font-size: 0.55rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .detail-modal-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
    }

    .detail-modal-desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 1.4rem;
    }

    .detail-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .detail-modal-price {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .detail-modal-add {
      flex: 1;
      max-width: 200px;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .detail-modal-add:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.35);
    }

    .detail-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 2;
    }

    .detail-modal-close:hover {
      background: rgba(0,0,0,0.7);
      color: #fff;
    }

    /* ---------- SECTION GLOW PULSE ---------- */
    @keyframes cardGlow {
      0% { box-shadow: 0 2px 8px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.06); }
      40% { box-shadow: 0 0 20px rgba(255,255,255,0.35), 0 0 50px rgba(255,255,255,0.12), inset 0 0 15px rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.4); }
      100% { box-shadow: 0 2px 8px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.06); }
    }

    .product-card.glow-pulse {
      animation: cardGlow 1s ease-out;
    }

    /* ---------- SPECS TABLE ---------- */
    .detail-specs {
      margin-top: 1rem;
      margin-bottom: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 0.8rem;
    }

    .detail-specs-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: all 0.2s ease;
    }

    .detail-specs-toggle:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.15);
    }

    .detail-specs-toggle .specs-arrow {
      font-size: 0.55rem;
      transition: transform 0.3s ease;
    }

    .detail-specs-toggle.open .specs-arrow {
      transform: rotate(180deg);
    }

    .detail-specs-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .detail-specs-content.open {
      max-height: 500px;
      opacity: 1;
      margin-top: 0.6rem;
    }

    .detail-spec-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 1rem;
    }

    .detail-spec-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      flex-shrink: 0;
    }

    .detail-spec-value {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      text-align: right;
      font-family: 'Space Mono', monospace;
    }

    .detail-packing {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.35);
      font-style: italic;
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes cartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    .cart-count.pop {
      animation: cartPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes addFlash {
      0% { background: rgba(255,255,255,0.03); }
      50% { background: rgba(255,255,255,0.12); }
      100% { background: rgba(255,255,255,0.03); }
    }

    .product-card.flash {
      animation: addFlash 0.4s ease;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 600px) {
      .cart-bar {
        flex-wrap: nowrap;
        gap: 0;
        padding: 0.4rem 0.5rem;
      }

      .cart-bar-left {
        flex: 1;
        min-width: 0;
        gap: 0;
        width: 100%;
      }

      .cart-bar-left > span {
        display: none;
      }

      .cart-category-pills {
        display: flex;
        gap: 0.3rem;
        flex: 1;
        width: 100%;
      }

      .cart-category-pills::-webkit-scrollbar { display: none; }

      .cart-pill {
        font-size: 0.55rem !important;
        padding: 0.3rem 0;
        white-space: nowrap;
        flex: 1;
        text-align: center;
        justify-content: center;
        border-radius: 8px;
      }

      /* Compact floating cart on mobile */
      .cart-fab {
        bottom: 3.5rem;
        right: 0.7rem;
        padding: 0.55rem 1rem;
        font-size: 0.65rem;
        gap: 0.4rem;
      }

      .cart-fab i { font-size: 0.85rem; }

      .store-grid {
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 0.7rem;
      }

      .product-card-body {
        padding: 0.6rem 0.7rem 0.7rem;
      }

      .product-card-name { font-size: 0.8rem; }
      .product-card-desc { display: none; }

      .product-card-price {
        font-size: 0.8rem;
      }

      .product-add-btn {
        font-size: 0.55rem;
        padding: 0.25rem 0.5rem;
        gap: 0.25rem;
      }

      .product-add-btn i {
        font-size: 0.5rem;
      }

      .product-badge {
        font-size: 0.45rem;
        padding: 0.15rem 0.4rem;
      }

      .product-sold-out-badge {
        font-size: 0.4rem;
        padding: 0.15rem 0.35rem;
      }

      .category-divider {
        margin: 1.5rem 0 0.8rem;
      }

      .category-divider-label {
        font-size: 0.55rem !important;
      }

      .product-swatches {
        margin-bottom: 0.4rem;
      }

      .product-swatch {
        width: 16px;
        height: 16px;
      }
    }

    /* ---------- COLOR SWATCHES ---------- */
    .product-swatches {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.65rem;
    }

    .product-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
    }

    .product-swatch:hover {
      transform: scale(1.15);
    }

    .product-swatch.active {
      border-color: rgba(255,255,255,0.6);
    }

    .product-swatch.sold-out {
      cursor: not-allowed;
    }

    .product-swatch.sold-out::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70%;
      height: 2px;
      background: #e53935;
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 1px;
    }

    .product-swatch.sold-out::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70%;
      height: 2px;
      background: #e53935;
      transform: translate(-50%, -50%) rotate(-45deg);
      border-radius: 1px;
    }

    .product-swatch-label {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      font-family: 'Space Mono', monospace;
      margin-left: 0.15rem;
    }

    /* ---------- SOLD OUT ---------- */
    .product-sold-out-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      font-size: 0.5rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: rgba(255,50,50,0.25);
      color: rgba(255,120,120,0.9);
      border: 1px solid rgba(255,80,80,0.2);
    }

    .product-card.sold-out .product-card-img img {
      opacity: 0.7;
    }

    .product-add-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ---------- SCROLLBAR ---------- */
    .cart-drawer-items::-webkit-scrollbar { width: 4px; }
    .cart-drawer-items::-webkit-scrollbar-track { background: transparent; }
    .cart-drawer-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>

  <div id="header-container" role="banner"></div>

  <!-- ====== FLOATING CART BUTTON ====== -->

    <i class="fas fa-shopping-bag"></i>
    <span class="cart-fab-label">Carrinho</span>
    <span class="cart-count" id="cartCount">0</span>
  </button>

  <!-- ====== MAIN STORE ====== -->
  <main>
    <!-- ====== CART BAR ====== -->
    <div class="cart-bar">
      <div class="cart-bar-left">
        <span>Mercado</span>
        <div class="cart-category-pills">
          <a class="cart-pill" href="#rigs" style="font-family:'RIG';font-size:0.75rem;text-transform:none;">LINDEPENDANT</a>
          <a class="cart-pill" href="#merch" style="font-family:'LIB';font-size:0.75rem;text-transform:none;">LIBERDADE</a>
          <a class="cart-pill" href="#projetos" style="font-family:'FAB';font-size:0.75rem;text-transform:none;">LA FABRICA</a>
        </div>
      </div>
    </div>

    <section class="store-section" id="storeSection"></section>
  </main>

  <!-- ====== PRODUCT DETAIL MODAL ====== -->
  <div class="detail-overlay" id="detailOverlay"></div>
  <div class="detail-modal" id="detailModal">
    <button class="detail-modal-close" id="detailClose">&times;</button>
    <div class="detail-gallery" id="detailGallery">
      <img class="detail-modal-img" id="detailImg" src="" alt="" />
      <div class="detail-thumbs" id="detailThumbs"></div>
    </div>
    <div class="detail-modal-body">
      <div class="detail-modal-badge" id="detailBadge"></div>
      <h2 class="detail-modal-name" id="detailName"></h2>
      <p class="detail-modal-desc" id="detailDesc"></p>
      <div class="detail-modal-footer">
        <span class="detail-modal-price" id="detailPrice"></span>
        <button class="detail-modal-add" id="detailAddBtn">+ Adicionar</button>
      </div>
    </div>
  </div>

  <!-- ====== CART DRAWER ====== -->
  <div class="cart-drawer-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <span class="cart-drawer-title">Carrinho</span>
      <button class="cart-drawer-close" id="cartClose">&times;</button>
    </div>
    <div class="cart-drawer-items" id="cartItems">
      <div class="cart-drawer-empty">Carrinho vazio</div>
    </div>
    <div class="cart-drawer-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount" id="cartTotal">&euro;0</span>
      </div>
      <button class="cart-checkout-btn" id="checkoutBtn" disabled>
        Finalizar compra
        <svg class="stripe-icon" viewBox="0 0 60 25" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M5 1.8C5 .8 5.8 0 6.8 0h46.4C54.2 0 55 .8 55 1.8v21.4c0 1-.8 1.8-1.8 1.8H6.8C5.8 25 5 24.2 5 23.2V1.8zm14.7 8.4c0-.7.6-1 1.5-1 1.3 0 3 .4 4.3 1.1V6.6c-1.4-.6-2.9-.8-4.3-.8-3.5 0-5.9 1.8-5.9 4.9 0 4.8 6.6 4 6.6 6.1 0 .8-.7 1.1-1.7 1.1-1.5 0-3.4-.6-4.9-1.4v3.7c1.7.7 3.3 1 4.9 1 3.6 0 6.1-1.8 6.1-4.9 0-5.2-6.6-4.3-6.6-6.1z"/></svg>
      </button>
    </div>
  </div>

  <script>
    // ===================================
    //  PRODUCT DATA
    //  Replace stripePriceId with real Stripe Price IDs
    // ===================================
    const PRODUCTS = [
      {
        id: 'rig1', name: 'Rig Básico',
        desc: 'Rig leve e versátil, ideal para iniciantes e gravações do dia-a-dia. Compatível com a maioria das câmaras mirrorless.',
        price: 40, img: 'FX3test.jpg', images: ['FX3test.jpg'], category: 'rigs',
        categoryLabel: "LINDEPENDANT", categoryFont: "'RIG'", badge: 'Rig',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      },
      {
        id: 'rig2', name: 'Shoulder Rig',
        desc: 'Estabilidade superior para filmagens em movimento. Construção em alumínio com ajuste ergonómico.',
        price: 60, img: 'FX3test.jpg', images: ['FX3test.jpg'], category: 'rigs',
        categoryLabel: "LINDEPENDANT", categoryFont: "'RIG'", badge: 'Rig',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      },
      {
        id: 'ulanzi-dg01-black', name: 'Ulanzi DG01',
        desc: 'Mini LED cube light ultracompacta com difusor magnético. CRI ≥95, 5600K, bateria 500mAh recarregável via Type-C.',
        price: 19, img: 'items/cube1.jpg',
        images: ['items/cube1.jpg', 'items/cube2.jpg', 'items/cube3.jpg', 'items/cube4.jpg', 'items/cube5.jpg'],
        category: 'rigs',
        categoryLabel: "LINDEPENDANT", categoryFont: "'RIG'", badge: 'Light',
        stripePriceId: 'price_XXXXXXXXXXXXXX',
        specs: {
          'Material': 'ABS+PC (V0 flame-retardant)',
          'Dimensões (c/ difusor)': '30 × 32 × 28.5 mm',
          'Peso (c/ difusor)': '22g',
          'CRI': '≥95',
          'CCT': '5600K ±200K',
          'Potência máx.': '≈1W',
          'Voltagem': '3.7V',
          'Bateria': '500mAh',
          'Carregamento': 'Type-C (5V/1A), ≈2H',
          'Autonomia': 'Nível 1: ≈4.5H · Nível 2: ≈3.5H · Nível 3: ≈2.5H'
        },
        packingList: 'Cube Light ×1, Difusor ×1, Manual ×1',
        variants: [
          { id: 'ulanzi-dg01-black', label: 'Preto', color: '#1a1a1a', available: true },
          { id: 'ulanzi-dg01-white', label: 'Branco', color: '#f0f0f0', available: false }
        ],
        activeVariant: 'ulanzi-dg01-black'
      },
      {
        id: 'ulanzi-dg01-white', name: 'Ulanzi DG01',
        desc: 'Mini LED cube light ultracompacta com difusor magnético. CRI ≥95, 5600K, bateria 500mAh recarregável via Type-C. Perfeita para vlogging, fotografia de produto e iluminação criativa.',
        price: 25, img: 'items/cube1.jpg',
        images: ['items/cube1.jpg', 'items/cube2.jpg', 'items/cube3.jpg', 'items/cube4.jpg', 'items/cube5.jpg'],
        category: 'rigs',
        categoryLabel: "LINDEPENDANT", categoryFont: "'RIG'", badge: 'Light',
        stripePriceId: 'price_XXXXXXXXXXXXXX',
        soldOut: true,
        hidden: true
      },
      {
        id: 'merch1', name: 'Camiseta Club',
        desc: 'Algodão premium 180g com o logo bordado do Club Benares. Corte unisexo oversized.',
        price: 20, img: 'HOODIEtest.jpg', images: ['HOODIEtest.jpg'], category: 'merch',
        categoryLabel: 'LIBERDADE', categoryFont: "'LIB'", badge: 'Merch',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      },
      {
        id: 'merch2', name: 'Boné Preto',
        desc: 'Boné snapback preto com bordado frontal Club Benares. Tamanho ajustável.',
        price: 15, img: 'HOODIEtest.jpg', images: ['HOODIEtest.jpg'], category: 'merch',
        categoryLabel: 'LIBERDADE', categoryFont: "'LIB'", badge: 'Merch',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      },
      {
        id: 'proj1', name: 'Câmera DIY',
        desc: 'Câmera montada artesanalmente com componentes selecionados. Excelente para experimentação e testes criativos.',
        price: 120, img: '3Dcameratest.jpeg', images: ['3Dcameratest.jpeg'], category: 'projetos',
        categoryLabel: 'LA FABRICA', categoryFont: "'FAB'", badge: 'Projeto',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      },
      {
        id: 'proj2', name: 'Slider Impresso 3D',
        desc: 'Slider de câmara impresso em 3D. Design compacto e portátil para planos suaves e cinematográficos.',
        price: 35, img: '3Dcameratest.jpeg', images: ['3Dcameratest.jpeg'], category: 'projetos',
        categoryLabel: 'LA FABRICA', categoryFont: "'FAB'", badge: 'Projeto',
        stripePriceId: 'price_XXXXXXXXXXXXXX'
      }
    ];

    // ===================================
    //  STATE
    // ===================================
    let cart = [];
    let currentDetailProduct = null;

    // ===================================
    //  RENDER PRODUCTS
    // ===================================
    function renderProducts() {
      const section = document.getElementById('storeSection');

      // Filter out hidden variant products
      const visibleProducts = PRODUCTS.filter(p => !p.hidden);

      // Always show all products grouped by category
      const groups = {};
      visibleProducts.forEach(p => {
        if (!groups[p.category]) groups[p.category] = { label: p.categoryLabel, font: p.categoryFont, items: [] };
        groups[p.category].items.push(p);
      });

      let html = '';
      Object.entries(groups).forEach(([key, group]) => {
        html += `
          <div class="category-divider" id="${key}" style="scroll-margin-top: 3.5rem;">
            <span class="category-divider-label" style="font-family:${group.font}; font-size:0.85rem; letter-spacing:0.08em;">${group.label}</span>
            <div class="category-divider-line"></div>
            <span class="category-count">${group.items.length} produto${group.items.length > 1 ? 's' : ''}</span>
          </div>
          <div class="store-grid">`;
        group.items.forEach(p => {
          // Determine current variant state
          const activeVar = p.variants ? p.variants.find(v => v.id === p.activeVariant) : null;
          const isSoldOut = activeVar ? !activeVar.available : !!p.soldOut;
          const inCart = cart.find(c => c.id === (activeVar ? activeVar.id : p.id));

          // Build swatch HTML
          let swatchHtml = '';
          if (p.variants && p.variants.length > 1) {
            const swatches = p.variants.map(v => {
              const activeClass = v.id === p.activeVariant ? 'active' : '';
              const soldClass = !v.available ? 'sold-out' : '';
              return `<span class="product-swatch ${activeClass} ${soldClass}" data-swatch="${p.id}" data-variant="${v.id}" style="background:${v.color};" title="${v.label}${!v.available ? ' — Esgotado' : ''}"></span>`;
            }).join('');
            const activeLabel = activeVar ? activeVar.label : '';
            swatchHtml = `<div class="product-swatches">${swatches}<span class="product-swatch-label">${activeLabel}${isSoldOut ? ' — Esgotado' : ''}</span></div>`;
          }

          // Sold out badge
          const soldBadge = isSoldOut ? '<span class="product-sold-out-badge">Esgotado</span>' : '';

          html += `
            <div class="product-card ${isSoldOut ? 'sold-out' : ''}" data-id="${p.id}">
              <div class="product-card-img" data-detail="${p.id}">
                <img src="${p.img}" alt="${p.name}" loading="lazy" />
                <span class="product-badge">${p.badge}</span>
                ${soldBadge}
              </div>
              <div class="product-card-body">
                <div class="product-card-name">${p.name}</div>
                ${swatchHtml}
                <div class="product-card-desc">${p.desc}</div>
                <div class="product-card-footer">
                  <span class="product-card-price">&euro;${p.price}</span>
                  ${isSoldOut
                    ? '<button class="product-add-btn disabled"><i class="fas fa-times"></i> Esgotado</button>'
                    : `<button class="product-add-btn ${inCart ? 'added' : ''}" data-add="${activeVar ? activeVar.id : p.id}">
                        ${inCart ? `<i class="fas fa-check"></i> ${inCart.qty}` : '<i class="fas fa-plus"></i> Adicionar'}
                      </button>`
                  }
                </div>
              </div>
            </div>`;
        });
        html += '</div>';
      });

      section.innerHTML = html;
      bindProductEvents();
    }

    function bindProductEvents() {
      document.querySelectorAll('[data-add]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          addToCart(btn.dataset.add);
        });
      });
      document.querySelectorAll('[data-detail]').forEach(el => {
        el.addEventListener('click', () => openDetail(el.dataset.detail));
      });
      // Color swatch switching
      document.querySelectorAll('[data-swatch]').forEach(swatch => {
        swatch.addEventListener('click', (e) => {
          e.stopPropagation();
          const productId = swatch.dataset.swatch;
          const variantId = swatch.dataset.variant;
          const product = PRODUCTS.find(p => p.id === productId);
          if (product && product.variants) {
            product.activeVariant = variantId;
            renderProducts();
          }
        });
      });
    }

    // ===================================
    //  CART LOGIC
    // ===================================
    function addToCart(productId) {
      const existing = cart.find(c => c.id === productId);
      if (existing) existing.qty++;
      else cart.push({ id: productId, qty: 1 });
      updateCartUI();
      renderProducts();
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (card) { card.classList.add('flash'); setTimeout(() => card.classList.remove('flash'), 400); }
    }

    function removeFromCart(productId) {
      cart = cart.filter(c => c.id !== productId);
      updateCartUI(); renderCartItems(); renderProducts();
    }

    function changeQty(productId, delta) {
      const item = cart.find(c => c.id === productId);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) { removeFromCart(productId); return; }
      updateCartUI(); renderCartItems(); renderProducts();
    }

    function getCartTotal() {
      return cart.reduce((sum, item) => {
        const p = PRODUCTS.find(pr => pr.id === item.id);
        return sum + (p ? p.price * item.qty : 0);
      }, 0);
    }

    function getCartCount() {
      return cart.reduce((sum, item) => sum + item.qty, 0);
    }

    function updateCartUI() {
      const countEl = document.getElementById('cartCount');
      const totalEl = document.getElementById('cartTotal');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const count = getCartCount();
      countEl.textContent = count;
      if (count > 0) {
        countEl.classList.add('visible', 'pop');
        setTimeout(() => countEl.classList.remove('pop'), 350);
        checkoutBtn.disabled = false;
      } else {
        countEl.classList.remove('visible');
        checkoutBtn.disabled = true;
      }
      totalEl.textContent = `\u20AC${getCartTotal()}`;
    }

    function renderCartItems() {
      const container = document.getElementById('cartItems');
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-drawer-empty">Carrinho vazio</div>';
        return;
      }
      container.innerHTML = cart.map(item => {
        const p = PRODUCTS.find(pr => pr.id === item.id);
        if (!p) return '';
        return `
          <div class="cart-item">
            <img class="cart-item-img" src="${p.img}" alt="${p.name}" />
            <div class="cart-item-info">
              <div class="cart-item-name">${p.name}</div>
              <div class="cart-item-price">&euro;${p.price} cada</div>
            </div>
            <div class="cart-item-qty">
              <button onclick="changeQty('${p.id}', -1)">&minus;</button>
              <span>${item.qty}</span>
              <button onclick="changeQty('${p.id}', 1)">+</button>
            </div>
          </div>`;
      }).join('');
    }

    // ===================================
    //  CART DRAWER
    // ===================================
    function openCart() {
      document.getElementById('cartDrawer').classList.add('open');
      document.getElementById('cartOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      renderCartItems();
    }

    function closeCart() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('cartToggle').addEventListener('click', openCart);
    document.getElementById('cartClose').addEventListener('click', closeCart);
    document.getElementById('cartOverlay').addEventListener('click', closeCart);

    // ===================================
    //  PRODUCT DETAIL MODAL
    // ===================================
    function openDetail(productId) {
      const p = PRODUCTS.find(pr => pr.id === productId);
      if (!p) return;
      currentDetailProduct = p;

      const activeVar = p.variants ? p.variants.find(v => v.id === p.activeVariant) : null;
      const isSoldOut = activeVar ? !activeVar.available : !!p.soldOut;

      // Populate image gallery
      const imgs = p.images || [p.img];
      const mainImg = document.getElementById('detailImg');
      mainImg.src = imgs[0];
      mainImg.alt = p.name;

      const thumbsContainer = document.getElementById('detailThumbs');
      if (imgs.length > 1) {
        thumbsContainer.innerHTML = imgs.map((src, i) =>
          `<img class="detail-thumb ${i === 0 ? 'active' : ''}" src="${src}" alt="${p.name} ${i + 1}" data-thumb-idx="${i}" />`
        ).join('');
        thumbsContainer.querySelectorAll('.detail-thumb').forEach(thumb => {
          thumb.addEventListener('click', () => {
            mainImg.src = imgs[parseInt(thumb.dataset.thumbIdx)];
            thumbsContainer.querySelectorAll('.detail-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
          });
        });
      } else {
        thumbsContainer.innerHTML = '';
      }

      document.getElementById('detailBadge').textContent = p.categoryLabel + ' \u2014 ' + p.badge;
      document.getElementById('detailBadge').style.fontFamily = p.categoryFont;
      document.getElementById('detailName').textContent = p.name;
      document.getElementById('detailDesc').textContent = p.desc;
      document.getElementById('detailPrice').textContent = `\u20AC${p.price}`;

      const addBtn = document.getElementById('detailAddBtn');
      if (isSoldOut) {
        addBtn.textContent = 'Esgotado';
        addBtn.style.opacity = '0.3';
        addBtn.style.cursor = 'not-allowed';
        addBtn.disabled = true;
      } else {
        addBtn.textContent = '+ Adicionar';
        addBtn.style.opacity = '1';
        addBtn.style.cursor = 'pointer';
        addBtn.disabled = false;
      }

      // Render swatches inside detail modal
      let existingSwatches = document.getElementById('detailSwatches');
      if (existingSwatches) existingSwatches.remove();

      if (p.variants && p.variants.length > 1) {
        const container = document.createElement('div');
        container.id = 'detailSwatches';
        container.className = 'product-swatches';
        container.style.marginBottom = '1rem';
        p.variants.forEach(v => {
          const sw = document.createElement('span');
          sw.className = `product-swatch ${v.id === p.activeVariant ? 'active' : ''} ${!v.available ? 'sold-out' : ''}`;
          sw.style.background = v.color;
          sw.style.width = '24px';
          sw.style.height = '24px';
          sw.title = v.label + (!v.available ? ' — Esgotado' : '');
          sw.addEventListener('click', () => {
            p.activeVariant = v.id;
            closeDetail();
            renderProducts();
            setTimeout(() => openDetail(p.id), 50);
          });
          container.appendChild(sw);
        });
        const label = document.createElement('span');
        label.className = 'product-swatch-label';
        label.textContent = activeVar ? activeVar.label + (isSoldOut ? ' — Esgotado' : '') : '';
        container.appendChild(label);

        const descEl = document.getElementById('detailDesc');
        descEl.parentNode.insertBefore(container, descEl);
      }

      document.getElementById('detailOverlay').classList.add('active');
      document.getElementById('detailModal').classList.add('active');
      document.body.style.overflow = 'hidden';

      // Render specs table if available
      let existingSpecs = document.getElementById('detailSpecs');
      if (existingSpecs) existingSpecs.remove();

      if (p.specs || p.packingList) {
        const specsDiv = document.createElement('div');
        specsDiv.id = 'detailSpecs';
        specsDiv.className = 'detail-specs';

        let contentHtml = '';
        if (p.specs) {
          Object.entries(p.specs).forEach(([key, val]) => {
            contentHtml += `<div class="detail-spec-row"><span class="detail-spec-label">${key}</span><span class="detail-spec-value">${val}</span></div>`;
          });
        }
        if (p.packingList) {
          contentHtml += `<div class="detail-packing">📦 ${p.packingList}</div>`;
        }

        specsDiv.innerHTML = `
          <button class="detail-specs-toggle" id="specsToggle">
            <span>Especificações</span>
            <span class="specs-arrow">▼</span>
          </button>
          <div class="detail-specs-content" id="specsContent">${contentHtml}</div>
        `;

        const footer = document.querySelector('.detail-modal-footer');
        footer.parentNode.insertBefore(specsDiv, footer);

        document.getElementById('specsToggle').addEventListener('click', () => {
          document.getElementById('specsToggle').classList.toggle('open');
          document.getElementById('specsContent').classList.toggle('open');
        });
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('active');
      document.getElementById('detailModal').classList.remove('active');
      document.body.style.overflow = '';
      currentDetailProduct = null;
      const specs = document.getElementById('detailSpecs');
      if (specs) specs.remove();
      const swatches = document.getElementById('detailSwatches');
      if (swatches) swatches.remove();
    }

    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('detailOverlay').addEventListener('click', closeDetail);
    document.getElementById('detailAddBtn').addEventListener('click', () => {
      if (currentDetailProduct && !document.getElementById('detailAddBtn').disabled) {
        const p = currentDetailProduct;
        const activeVar = p.variants ? p.variants.find(v => v.id === p.activeVariant) : null;
        const addId = activeVar ? activeVar.id : p.id;
        addToCart(addId);
        closeDetail();
        setTimeout(openCart, 300);
      }
    });

    // ===================================
    //  CATEGORY PILL — SCROLL TO SECTION + ACTIVE HIGHLIGHT
    // ===================================
    document.querySelectorAll('.cart-pill').forEach(pill => {
      pill.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = pill.getAttribute('href').substring(1);
        const target = document.getElementById(targetId);
        if (!target) return;

        const main = document.querySelector('main');
        const cartBarHeight = document.querySelector('.cart-bar')?.offsetHeight || 0;
        const mainRect = main.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const scrollOffset = main.scrollTop + (targetRect.top - mainRect.top) - cartBarHeight - 4;
        main.scrollTo({ top: Math.max(0, scrollOffset), behavior: 'smooth' });

        // Glow pulse each card in the section
        const grid = target.nextElementSibling;
        if (grid && grid.classList.contains('store-grid')) {
          const cards = grid.querySelectorAll('.product-card');
          setTimeout(() => {
            cards.forEach((card, i) => {
              setTimeout(() => {
                card.classList.remove('glow-pulse');
                void card.offsetWidth;
                card.classList.add('glow-pulse');
                card.addEventListener('animationend', () => card.classList.remove('glow-pulse'), { once: true });
              }, i * 80);
            });
          }, 350);
        }
      });
    });

    function updateActivePill() {
      const main = document.querySelector('main');
      const sections = ['rigs', 'merch', 'projetos'];
      const pills = document.querySelectorAll('.cart-pill');
      const mainRect = main.getBoundingClientRect();
      const cartBarHeight = document.querySelector('.cart-bar')?.offsetHeight || 0;
      let current = '';

      sections.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          const top = el.getBoundingClientRect().top - mainRect.top - cartBarHeight;
          if (top <= 30) current = id;
        }
      });

      pills.forEach(pill => {
        const href = pill.getAttribute('href');
        if (href === `#${current}`) pill.classList.add('active');
        else pill.classList.remove('active');
      });
    }

    document.querySelector('main')?.addEventListener('scroll', updateActivePill, { passive: true });

    // ===================================
    //  STRIPE CHECKOUT
    //
    //  HOW TO SET UP (Portugal):
    //  1. Create a Stripe account at stripe.com (select Portugal as country)
    //  2. In the Stripe Dashboard, create Products and Price IDs for each item
    //  3. Replace 'price_XXXXXXXXXXXXXX' in PRODUCTS array above
    //  4. Replace 'pk_test_XXXXXXXXXXXXXX' below with your publishable key
    //  5. Deploy a serverless function (Cloudflare Worker / Vercel / Netlify)
    //     that creates a Checkout Session. Template below.
    //
    //  SERVERLESS FUNCTION TEMPLATE (Node.js):
    //  ─────────────────────────────────────
    //  const stripe = require('stripe')('sk_live_XXXXXXXXXXXXXX');
    //
    //  exports.handler = async (event) => {
    //    const { line_items } = JSON.parse(event.body);
    //    const session = await stripe.checkout.sessions.create({
    //      payment_method_types: ['card', 'multibanco', 'mbway'],
    //      line_items,
    //      mode: 'payment',
    //      currency: 'eur',
    //      locale: 'pt',
    //      shipping_address_collection: { allowed_countries: ['PT', 'ES', 'FR', 'DE'] },
    //      success_url: 'https://thebenaresclub.com/mercado/?success=true',
    //      cancel_url: 'https://thebenaresclub.com/mercado/?canceled=true',
    //    });
    //    return { statusCode: 200, body: JSON.stringify({ sessionId: session.id }) };
    //  };
    // ===================================

    document.getElementById('checkoutBtn').addEventListener('click', async () => {
      if (cart.length === 0) return;

      const btn = document.getElementById('checkoutBtn');
      btn.textContent = 'A processar...';
      btn.disabled = true;

      const lineItems = cart.map(item => {
        const product = PRODUCTS.find(p => p.id === item.id);
        return { price: product.stripePriceId, quantity: item.qty };
      });

      try {
        // ── UNCOMMENT WHEN BACKEND IS READY ──
        //
        // const response = await fetch('https://YOUR_BACKEND_URL/create-checkout-session', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ line_items: lineItems })
        // });
        // const { sessionId } = await response.json();
        // const stripe = Stripe('pk_live_XXXXXXXXXXXXXX');
        // await stripe.redirectToCheckout({ sessionId });

        // ── PLACEHOLDER UNTIL CONFIGURED ──
        const summary = cart.map(item => {
          const p = PRODUCTS.find(pr => pr.id === item.id);
          return `${p.name} \u00D7 ${item.qty} \u2014 \u20AC${p.price * item.qty}`;
        }).join('\n');

        alert(
          `\uD83D\uDED2 Resumo do pedido:\n\n${summary}\n\nTotal: \u20AC${getCartTotal()}\n\n` +
          `Para ativar pagamentos Stripe:\n` +
          `1. Cria conta em stripe.com (Portugal)\n` +
          `2. Cria Products + Price IDs no Dashboard\n` +
          `3. Configura o endpoint serverless\n` +
          `4. M\u00E9todos: Cart\u00E3o, Multibanco, MB WAY`
        );

      } catch (err) {
        console.error('Checkout error:', err);
        alert('Erro ao processar. Tenta novamente.');
      } finally {
        btn.innerHTML = 'Finalizar compra <svg class="stripe-icon" viewBox="0 0 60 25" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M5 1.8C5 .8 5.8 0 6.8 0h46.4C54.2 0 55 .8 55 1.8v21.4c0 1-.8 1.8-1.8 1.8H6.8C5.8 25 5 24.2 5 23.2V1.8zm14.7 8.4c0-.7.6-1 1.5-1 1.3 0 3 .4 4.3 1.1V6.6c-1.4-.6-2.9-.8-4.3-.8-3.5 0-5.9 1.8-5.9 4.9 0 4.8 6.6 4 6.6 6.1 0 .8-.7 1.1-1.7 1.1-1.5 0-3.4-.6-4.9-1.4v3.7c1.7.7 3.3 1 4.9 1 3.6 0 6.1-1.8 6.1-4.9 0-5.2-6.6-4.3-6.6-6.1z"/></svg>';
        btn.disabled = cart.length === 0;
      }
    });

    // ===================================
    //  KEYBOARD + URL PARAMS
    // ===================================
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeDetail(); closeCart(); }
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success') === 'true') {
      setTimeout(() => {
        alert('\u2705 Pagamento confirmado! Obrigado pela compra.');
        window.history.replaceState({}, '', window.location.pathname);
        cart = [];
        updateCartUI();
        renderProducts();
      }, 500);
    } else if (urlParams.get('canceled') === 'true') {
      window.history.replaceState({}, '', window.location.pathname);
    }

    // ===================================
    //  INIT
    // ===================================
    renderProducts();
  </script>

  <div id="footer-container"></div>
  <script>
    // Collapse nav on mobile — ONLY on this page (mercado)
    // Must run AFTER shared.js DOMContentLoaded creates the header
    window.addEventListener('DOMContentLoaded', function() {
      if (window.innerWidth <= 600) {
        setTimeout(function() {
          const nav = document.getElementById('main-nav');
          const arrowIcon = document.querySelector('.arrow-icon');
          const mainContent = document.querySelector('main');
          if (nav) {
            nav.classList.remove('active');
            if (mainContent) mainContent.style.paddingTop = '0';
            if (arrowIcon) arrowIcon.textContent = '▲';
          }
        }, 0);
      }
    });
  </script>

  <script src="/shared.js"></script>
</body>
</html>
