<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Laboratorio | Club Benares</title>
	
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../styles.css">
	<link rel="icon" href="./media/A00 Logo - Light.png" type="image/png" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="cinema-page">
	<div id="header-container">
		<!-- Pill nav will be injected here after header loads -->
	</div>
	
	<!-- Background video that changes on hover -->
	<video id="backgroundVideo" autoplay muted loop playsinline class="background-video">
		<source src="./movies/metropolis.mp4" type="video/mp4">
	</video>

	<main class="cinema-main">
		<div class="posters-grid" id="postersGrid">
			<!-- Movie posters loaded here -->
		</div>
	</main>

	<div id="footer-container"></div>
	<script src="../shared.js"></script>

	<style>
		/* Cinema page specific styles */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		/* Ensure header nav has lower z-index than pill nav */
		#main-nav {
			z-index: 50 !important;
		}

		/* Main container */
		main.cinema-main {
			position: fixed;
			top: 80px; /* Space for header only */
			bottom: 0; /* Touch the ground */
			left: 0;
			right: 0;
			width: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-end; /* Push posters to bottom */
			padding-bottom: 80px; /* Space above footer */
			z-index: 1;
		}

		body {
			background: #000 !important;
			background-image: none !important; /* Remove any inherited background */
			overflow: hidden;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		}

		/* Ensure header and footer are visible and not blurred */
		#header-container,
		#footer-container {
			position: relative;
			z-index: 1000;
			pointer-events: auto;
		}

		#header-container {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
		}

		#footer-container {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
		}

		/* Background video */
		.background-video {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: -1;
			opacity: 0.3;
			transition: opacity 0.5s ease;
		}

		/* Apple TV style pill navigation - inside header */

		/* Grid of posters - horizontal layout */
		.posters-grid {
			display: flex;
			gap: 2rem;
			align-items: flex-end; /* Align to bottom */
			padding: 0 1rem 0 2rem; /* Reduced padding for zoom compatibility */ /* Less padding on sides */
			min-width: min-content;
			width: 100%;
			overflow-x: scroll; /* Force horizontal scroll */
			overflow-y: hidden;
			scroll-snap-type: x proximity; /* Gentler snap */
			scroll-behavior: smooth; /* Smooth scrolling */
			-webkit-overflow-scrolling: touch; /* Smooth mobile scrolling */
			scrollbar-width: none;
			touch-action: pan-x; /* Enable horizontal touch swiping */
			cursor: grab; /* Show grab cursor */
			user-select: none; /* Prevent text selection while dragging */
		}

		.posters-grid:active {
			cursor: grabbing; /* Show grabbing cursor when dragging */
			scroll-snap-type: none; /* Disable snap while dragging */
		}

		.posters-grid::-webkit-scrollbar {
			display: none;
		}

		/* Individual poster card - smaller size */
		.poster-card {
			position: relative;
			width: 220px;
			height: 330px;
			flex-shrink: 0;
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.1);
			scroll-snap-align: center;
			pointer-events: auto; /* Allow hover/click on posters */
		}

		.poster-card:hover {
			transform: translateY(-40px); /* Lift up only */
			box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
			z-index: 10;
			border: 1px solid rgba(255, 255, 255, 0.3);
		}

		/* Poster image */
		.poster-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			transition: transform 0.5s ease;
		}

		.poster-card:hover img {
			transform: scale(1.05);
		}

		/* Poster info overlay */
		.poster-info {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			padding: 2rem 1.5rem 1.5rem;
			background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, transparent 100%);
			transform: translateY(100%);
			transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.poster-card:hover .poster-info {
			transform: translateY(0);
		}

		.poster-title {
			color: white;
			font-size: 1.25rem;
			font-weight: 600;
			margin: 0 0 0.5rem 0;
			letter-spacing: -0.02em;
		}

		.poster-meta {
			color: rgba(255, 255, 255, 0.7);
			font-size: 0.9rem;
			font-weight: 400;
		}

		/* Responsive */
		@media (max-width: 1200px) {
			.posters-grid {
				gap: 1.5rem;
				padding: 0 1.5rem;
			}
			.poster-card {
				width: 200px;
				height: 300px;
			}
		}

		@media (max-width: 768px) {
			main.cinema-main {
				padding-bottom: 70px;
			}
			.posters-grid {
				gap: 1.2rem;
				padding: 0 1rem;
			}
			.poster-card {
				width: 170px;
				height: 255px;
			}
		}

		@media (max-width: 600px) {
			main.cinema-main {
				padding-bottom: 60px;
			}
			.posters-grid {
				gap: 1rem;
				padding: 0 1rem;
				scroll-padding: 0 1rem;
			}
			.poster-card {
				width: 150px;
				height: 225px;
			}
		}

		@media (max-width: 480px) {
			main.cinema-main {
				top: 80px;
				padding-bottom: 50px;
			}
			.posters-grid {
				gap: 0.8rem;
				padding: 0 0.5rem;
			}
			.poster-card {
				width: 140px;
				height: 210px;
			}

		}
		/* Disable hover on touch devices */
		@media (hover: none) and (pointer: coarse) {
			.poster-card:hover {
				transform: none !important;
			}
			.posters-grid {
				cursor: default !important;
			}
		}
	</style>

	<script>
		console.log('🎬 Cinema page loading...');

		// Movie data with local files
		const movies = [
			{
				title: 'Inexistente',
				year: '2024',
				poster: './movies/inexistente.jpg',
				video: './movies/inexistente.mp4'
			},
			{
				title: 'Metropolis',
				year: '1927',
				poster: './movies/metropolis.jpg',
				video: './movies/metropolis.mp4'
			},
			{
				title: 'El Artista Comprendido',
				year: '2024',
				poster: './movies/elartistacomprendido.jpg',
				video: './movies/elartistacomprendido.mp4'
			},
			{
				title: 'Mystery Film',
				year: '2025',
				poster: './movies/placeholder.jpg',
				video: './movies/placeholder.mp4'
			}
		];

		const backgroundVideo = document.getElementById('backgroundVideo');

		// Load posters
		function loadPosters() {
			console.log('🎯 Loading posters...');
			const grid = document.getElementById('postersGrid');
			
			grid.innerHTML = movies.map((movie, index) => `
				<div class="poster-card" data-video="${movie.video}" data-index="${index}">
					<img src="${movie.poster}" alt="${movie.title}">
					<div class="poster-info">
						<h3 class="poster-title">${movie.title}</h3>
						<p class="poster-meta">${movie.year}</p>
					</div>
				</div>
			`).join('');

			console.log(`✅ Loaded ${movies.length} posters`);
			
			// Add hover events
			document.querySelectorAll('.poster-card').forEach(card => {
				const videoSrc = card.dataset.video;
				const index = card.dataset.index;
				
				card.addEventListener('mouseenter', () => {
					console.log(`🎥 Hovering ${movies[index].title}`);
					backgroundVideo.src = videoSrc;
					backgroundVideo.style.opacity = '0.5';
				});
				
				card.addEventListener('mouseleave', () => {
					console.log('⬅️ Mouse left poster');
					backgroundVideo.style.opacity = '0.3';
				});
			});
		}

		// Initialize
		document.addEventListener('DOMContentLoaded', () => {
			console.log('✨ Cinema page loaded');
			
			
			loadPosters();
			initDragScroll(); // Enable mouse drag scrolling
		});

		// Enable mouse drag scrolling on posters grid
		function initDragScroll() {
			const slider = document.getElementById('postersGrid');
			let isDown = false;
			let startX;
			let scrollLeft;

			slider.addEventListener('mousedown', (e) => {
				isDown = true;
				slider.style.cursor = 'grabbing';
				slider.style.userSelect = 'none';
				startX = e.pageX - slider.offsetLeft;
				scrollLeft = slider.scrollLeft;
			});

			slider.addEventListener('mouseleave', () => {
				isDown = false;
				slider.style.cursor = 'grab';
			});

			slider.addEventListener('mouseup', () => {
				isDown = false;
				slider.style.cursor = 'grab';
			});

			slider.addEventListener('mousemove', (e) => {
				if (!isDown) return;
				e.preventDefault();
				const x = e.pageX - slider.offsetLeft;
				const walk = (x - startX) * 2; // Scroll speed multiplier
				slider.scrollLeft = scrollLeft - walk;
			});

			// Set initial cursor
			slider.style.cursor = 'grab';

			// Touch events for mobile swipe
			let touchStartX = 0;
			let touchScrollLeft = 0;
			
			slider.addEventListener('touchstart', (e) => {
				touchStartX = e.touches[0].pageX;
				touchScrollLeft = slider.scrollLeft;
			}, { passive: true });
			
			slider.addEventListener('touchmove', (e) => {
				const x = e.touches[0].pageX;
				const walk = (touchStartX - x) * 1.5;
				slider.scrollLeft = touchScrollLeft + walk;
			}, { passive: true });

			console.log('✅ Drag and touch scrolling enabled');
		}

	</script>

</body>
</html>
