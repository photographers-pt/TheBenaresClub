<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Laboratorio | Club Benares</title>
	
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../styles.css">
	<link rel="icon" href="./media/A00 Logo - Light.png" type="image/png" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
	<div id="header-container"></div>
	
	<!-- Background video that changes on hover -->
	<video id="backgroundVideo" autoplay muted loop playsinline class="background-video">
		<source src="./movies/metropolis.mp4" type="video/mp4">
	</video>

	<main class="cinema-main">
		<!-- Apple TV style pill navigation -->
		<nav class="pill-nav">
			<button class="pill-tab active" data-category="all">
				<span>Watch Now</span>
			</button>
			<button class="pill-tab" data-category="movies">
				<span>Movies</span>
			</button>
			<button class="pill-tab" data-category="shorts">
				<span>Shorts</span>
			</button>
			<button class="pill-tab" data-category="search">
				<span><i class="fas fa-search"></i></span>
			</button>
		</nav>

		<div class="posters-grid" id="postersGrid">
			<!-- Movie posters loaded here -->
		</div>
	</main>

	<div id="footer-container"></div>
	<script src="../shared.js"></script>

	<style>
		/* CRITICAL: Override global styles.css for cinema page */
		body {
			display: block !important; /* Override grid layout */
			overflow: hidden !important;
			background: #000 !important;
		}

		main.cinema-main {
			/* Override all global main styles */
			overflow: visible !important;
			display: flex !important;
			flex-direction: column !important;
			padding: 0 !important;
			min-height: auto !important;
			position: fixed !important;
			top: 80px !important;
			bottom: 60px !important;
			left: 0 !important;
			right: 0 !important;
			width: 100% !important;
			height: auto !important;
			z-index: 1 !important;
		}

		/* Ensure header nav doesn't conflict with pill nav */
		#main-nav {
			z-index: 50 !important; /* Lower than pill nav */
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #000;
			overflow: hidden;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		}

		/* Ensure header and footer are visible and not blurred */
		#header-container,
		#footer-container {
			position: relative;
			z-index: 1000;
			pointer-events: auto;
		}

		#header-container {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
		}

		#footer-container {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
		}

		/* Background video */
		.background-video {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: -1;
			opacity: 0.3;
			transition: opacity 0.5s ease;
		}

		/* Apple TV style pill navigation */
		.pill-nav {
			display: flex !important;
			justify-content: center !important;
			align-items: center !important;
			gap: 0.5rem;
			padding: 0.8rem 1rem;
			background: rgba(255, 0, 0, 0.9) !important; /* BRIGHT RED for debugging */
			backdrop-filter: blur(20px) saturate(180%);
			-webkit-backdrop-filter: blur(20px) saturate(180%);
			border-radius: 50px;
			margin: 1rem auto 0 !important;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
			z-index: 500 !important; /* Higher than header nav (100) */
			flex-shrink: 0 !important;
			border: 3px solid yellow !important; /* YELLOW BORDER for debugging */
			position: relative !important;
			min-height: 50px !important;
		}

		.pill-tab {
			padding: 0.7rem 1.3rem !important;
			background: rgba(255, 255, 0, 0.5) !important; /* YELLOW background for debugging */
			border: 2px solid lime !important; /* LIME border for debugging */
			border-radius: 50px !important;
			color: #000 !important; /* BLACK text for visibility */
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
			font-size: 1rem !important;
			font-weight: 700 !important;
			cursor: pointer !important;
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
			white-space: nowrap !important;
		}

		.pill-tab:hover {
			background: rgba(255, 255, 0, 0.8) !important;
		}

		.pill-tab.active {
			background: rgba(0, 255, 0, 1) !important; /* BRIGHT GREEN for active */
			color: rgba(0, 0, 0, 1) !important;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
		}

		/* Grid of posters - horizontal layout */
		.posters-grid {
			display: flex !important;
			gap: 2rem !important;
			align-items: center !important;
			padding: 0 4rem !important;
			min-width: min-content !important;
			flex: 1 !important;
			overflow-x: auto !important;
			overflow-y: hidden !important;
			scroll-snap-type: x mandatory !important;
			-webkit-overflow-scrolling: touch !important;
			scrollbar-width: none !important;
			margin-top: 2rem !important;
		}

		.posters-grid::-webkit-scrollbar {
			display: none !important;
		}

		/* Individual poster card - smaller size */
		.poster-card {
			position: relative;
			width: 220px;
			height: 330px;
			flex-shrink: 0;
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.1);
			scroll-snap-align: center;
		}

		.poster-card:hover {
			transform: scale(1.15) translateY(-10px);
			box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
			z-index: 10;
			border: 1px solid rgba(255, 255, 255, 0.3);
		}

		/* Poster image */
		.poster-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			transition: transform 0.5s ease;
		}

		.poster-card:hover img {
			transform: scale(1.05);
		}

		/* Poster info overlay */
		.poster-info {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			padding: 2rem 1.5rem 1.5rem;
			background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, transparent 100%);
			transform: translateY(100%);
			transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.poster-card:hover .poster-info {
			transform: translateY(0);
		}

		.poster-title {
			color: white;
			font-size: 1.25rem;
			font-weight: 600;
			margin: 0 0 0.5rem 0;
			letter-spacing: -0.02em;
		}

		.poster-meta {
			color: rgba(255, 255, 255, 0.7);
			font-size: 0.9rem;
			font-weight: 400;
		}

		/* Responsive */
		@media (max-width: 1200px) {
			.posters-grid {
				gap: 1.5rem;
				padding: 0 3rem;
			}
			.poster-card {
				width: 200px;
				height: 300px;
			}
		}

		@media (max-width: 768px) {
			.pill-nav {
				gap: 0.3rem;
				padding: 0.5rem 0.6rem;
			}
			.pill-tab {
				padding: 0.5rem 0.9rem;
				font-size: 0.8rem;
			}
			.posters-grid {
				gap: 1.2rem;
				padding: 0 2rem;
			}
			.poster-card {
				width: 170px;
				height: 255px;
			}
		}

		@media (max-width: 600px) {
			.pill-nav {
				gap: 0.25rem;
				padding: 0.4rem 0.5rem;
			}
			.pill-tab {
				padding: 0.4rem 0.7rem;
				font-size: 0.75rem;
			}
			.posters-grid {
				gap: 1rem;
				padding: 0 1.5rem;
			}
			.poster-card {
				width: 150px;
				height: 225px;
			}
		}
	</style>

	<script>
		console.log('🎬 Cinema page loading...');

		// Movie data with local files
		const movies = [
			{
				title: 'Inexistente',
				year: '2024',
				poster: './movies/inexistente.jpg',
				video: './movies/inexistente.mp4'
			},
			{
				title: 'Metropolis',
				year: '1927',
				poster: './movies/metropolis.jpg',
				video: './movies/metropolis.mp4'
			},
			{
				title: 'El Artista Comprendido',
				year: '2024',
				poster: './movies/elartistacomprendido.jpg',
				video: './movies/elartistacomprendido.mp4'
			}
		];

		const backgroundVideo = document.getElementById('backgroundVideo');

		// Load posters
		function loadPosters() {
			console.log('🎯 Loading posters...');
			const grid = document.getElementById('postersGrid');
			
			grid.innerHTML = movies.map((movie, index) => `
				<div class="poster-card" data-video="${movie.video}" data-index="${index}">
					<img src="${movie.poster}" alt="${movie.title}">
					<div class="poster-info">
						<h3 class="poster-title">${movie.title}</h3>
						<p class="poster-meta">${movie.year}</p>
					</div>
				</div>
			`).join('');

			console.log(`✅ Loaded ${movies.length} posters`);
			
			// Add hover events
			document.querySelectorAll('.poster-card').forEach(card => {
				const videoSrc = card.dataset.video;
				const index = card.dataset.index;
				
				card.addEventListener('mouseenter', () => {
					console.log(`🎥 Hovering ${movies[index].title}`);
					backgroundVideo.src = videoSrc;
					backgroundVideo.style.opacity = '0.5';
				});
				
				card.addEventListener('mouseleave', () => {
					console.log('⬅️ Mouse left poster');
					backgroundVideo.style.opacity = '0.3';
				});
			});
		}

		// Initialize
		document.addEventListener('DOMContentLoaded', () => {
			console.log('✨ DOM ready');
			
			// Debug: Check body and main styles
			const body = document.body;
			const main = document.querySelector('main');
			console.log('📐 Body display:', window.getComputedStyle(body).display);
			console.log('📐 Main display:', window.getComputedStyle(main).display);
			console.log('📐 Main position:', window.getComputedStyle(main).position);
			console.log('📐 Main top:', window.getComputedStyle(main).top);
			console.log('📐 Main flex-direction:', window.getComputedStyle(main).flexDirection);
			
			// Debug: Check if pill nav exists
			const pillNav = document.querySelector('.pill-nav');
			console.log('🔍 Pill nav element:', pillNav);
			if (pillNav) {
				console.log('✅ Pill nav found!');
				console.log('📐 Pill nav display:', window.getComputedStyle(pillNav).display);
				console.log('📐 Pill nav visibility:', window.getComputedStyle(pillNav).visibility);
				console.log('📐 Pill nav z-index:', window.getComputedStyle(pillNav).zIndex);
				console.log('📐 Pill nav position:', window.getComputedStyle(pillNav).position);
				console.log('📐 Pill nav background:', window.getComputedStyle(pillNav).background);
				
				const rect = pillNav.getBoundingClientRect();
				console.log('📐 Pill nav screen position:', {
					top: rect.top,
					left: rect.left,
					bottom: rect.bottom,
					right: rect.right,
					width: rect.width,
					height: rect.height
				});
				console.log('📐 Window height:', window.innerHeight);
				
				if (rect.top < 0) {
					console.warn('⚠️ Pill nav is ABOVE the viewport!');
				} else if (rect.bottom > window.innerHeight) {
					console.warn('⚠️ Pill nav is BELOW the viewport!');
				} else {
					console.log('✅ Pill nav is VISIBLE in viewport');
				}
			} else {
				console.error('❌ Pill nav NOT found!');
			}
			
			loadPosters();
			initPillNav();
		});

		// Pill navigation
		function initPillNav() {
			const tabs = document.querySelectorAll('.pill-tab');
			console.log(`🔍 Found ${tabs.length} pill tabs`);
			
			tabs.forEach((tab, index) => {
				console.log(`  Tab ${index}: ${tab.textContent.trim()}`);
				
				tab.addEventListener('click', () => {
					const category = tab.dataset.category;
					console.log(`📱 Clicked: ${category}`);
					
					// Handle search separately
					if (category === 'search') {
						console.log('🔍 Search clicked');
						return;
					}
					
					// Update active state
					tabs.forEach(t => t.classList.remove('active'));
					tab.classList.add('active');
					
					// For now, just show all movies
					// You can add filtering logic here later
					loadPosters();
				});
			});
			
			console.log('✅ Pill navigation initialized');
		}
	</script>

</body>
</html>
